<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QR tải Vinh Khanh Food Guide</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Noto Sans", "Helvetica Neue", sans-serif;
      background: #fff7ed;
      color: #1f2937;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.24), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(234, 88, 12, 0.16), transparent 28rem),
        linear-gradient(135deg, #fff7ed, #fef3c7 50%, #fff);
    }

    main {
      width: min(620px, 100%);
      border-radius: 28px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 24px 80px rgba(146, 64, 14, 0.18);
      border: 1px solid rgba(245, 158, 11, 0.22);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1.08;
      color: #9a3412;
    }

    p {
      margin: 0 auto 18px;
      max-width: 520px;
      line-height: 1.65;
      color: #4b5563;
    }

    .qr {
      display: block;
      width: min(300px, 78vw);
      height: auto;
      margin: 22px auto 18px;
      padding: 14px;
      border-radius: 22px;
      background: #fff;
      border: 1px solid rgba(245, 158, 11, 0.24);
      box-shadow: 0 14px 38px rgba(146, 64, 14, 0.12);
    }

    .note {
      margin-top: 16px;
      font-size: 14px;
      color: #6b7280;
    }

  </style>
</head>

<body>
  <main>
    <h1>Quét QR để tải app</h1>
    <p>Quét mã QR bên dưới bằng điện thoại Android để mở ngay đường dẫn host APK và tải bản cài đặt Vinh Khanh Food
      Guide.</p>
    <img class="qr" src="./qr-direct-apk.png" alt="Mã QR tải trực tiếp APK Vinh Khanh Food Guide">
    <p class="note">
      https://vinh-khanh-food-tour-f2ddbxcgbabmfehr.eastasia-01.azurewebsites.net/downloads/vinh-khanh-food-guide/tour.apk
    </p>
  </main>
</body>

</html>
