<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tải ứng dụng Vĩnh Khánh Food Guide</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", "Noto Sans", "Helvetica Neue", sans-serif;
      background: #fff7ed;
      color: #1f2937;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.24), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(234, 88, 12, 0.16), transparent 28rem),
        linear-gradient(135deg, #fff7ed, #fef3c7 50%, #fff);
    }

    main {
      width: min(620px, 100%);
      border-radius: 30px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.93);
      box-shadow: 0 24px 80px rgba(146, 64, 14, 0.18);
      border: 1px solid rgba(245, 158, 11, 0.22);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1.08;
      color: #9a3412;
    }

    p {
      margin: 0 auto 20px;
      max-width: 520px;
      line-height: 1.65;
      color: #4b5563;
    }

    .qr {
      display: block;
      width: min(300px, 78vw);
      height: auto;
      margin: 22px auto 18px;
      padding: 14px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(245, 158, 11, 0.24);
      box-shadow: 0 14px 38px rgba(146, 64, 14, 0.12);
    }

  </style>
</head>

<body>
  <main>
    <h1>Tải ứng dụng Vĩnh Khánh Food Guide</h1>
    <p>Quét mã QR bên dưới bằng điện thoại Android để tải trực tiếp file APK về máy. Mã QR này trỏ thẳng tới file cài
      đặt, không đi qua trang trung gian.</p>
    <img class="qr" src="./qr-direct-apk.png" alt="Mã QR tải trực tiếp APK Vĩnh Khánh Food Guide">
  </main>
</body>

</html>
