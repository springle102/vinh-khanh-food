<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>OpenStreetMap</title>
  <style>
    __LEAFLET_CSS__

    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #f0ece6;
    }

    .leaflet-container {
      background: #f0ece6;
    }

    .leaflet-control-zoom,
    .leaflet-control-attribution {
      display: none;
    }

    .leaflet-tile {
      filter: saturate(0.82) brightness(1.03);
    }

    .poi-marker {
      position: relative;
      width: 24px;
      height: 24px;
    }

    .poi-marker__halo {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      transform: scale(1.7);
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .poi-marker__dot {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      border: 3px solid #ffffff;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.20);
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .poi-marker__order {
      position: absolute;
      right: -7px;
      top: -8px;
      min-width: 16px;
      height: 16px;
      padding: 0 3px;
      border-radius: 9999px;
      background: #fff7ed;
      border: 1px solid rgba(217, 119, 6, 0.35);
      color: #9a3412;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .poi-marker.muted .poi-marker__dot,
    .poi-marker.muted .poi-marker__halo {
      opacity: 0.54;
    }

    .poi-marker.in-tour .poi-marker__dot {
      box-shadow: 0 12px 20px rgba(217, 119, 6, 0.22);
    }

    .poi-marker.on-route .poi-marker__dot {
      box-shadow: 0 12px 22px rgba(14, 165, 233, 0.24);
    }

    .poi-marker.route-destination .poi-marker__dot {
      box-shadow: 0 14px 26px rgba(37, 99, 235, 0.26);
    }

    @keyframes selected-marker-pulse {
      0% {
        transform: scale(1.78);
        opacity: 0.88;
      }

      50% {
        transform: scale(2.06);
        opacity: 0.38;
      }

      100% {
        transform: scale(1.78);
        opacity: 0.88;
      }
    }

    @keyframes active-marker-pulse {
      0% {
        transform: scale(1.9);
        opacity: 0.82;
      }

      50% {
        transform: scale(2.18);
        opacity: 0.3;
      }

      100% {
        transform: scale(1.9);
        opacity: 0.82;
      }
    }

    @keyframes user-marker-pulse {
      0% {
        transform: scale(0.84);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.24);
        opacity: 0.18;
      }

      100% {
        transform: scale(0.84);
        opacity: 0.8;
      }
    }

    .poi-marker.selected .poi-marker__halo {
      transform: scale(1.95);
      animation: selected-marker-pulse 1.8s ease-in-out infinite;
    }

    .poi-marker.selected .poi-marker__dot {
      transform: scale(1.1);
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.24);
    }

    .poi-marker.active .poi-marker__halo {
      transform: scale(2.02);
      animation: active-marker-pulse 1.25s ease-in-out infinite;
    }

    .poi-marker.active .poi-marker__dot {
      transform: scale(1.14);
      box-shadow: 0 14px 24px rgba(194, 65, 12, 0.32);
    }

    .user-marker {
      position: relative;
      width: 30px;
      height: 30px;
    }

    .user-marker__pulse {
      position: absolute;
      inset: 1px;
      border-radius: 9999px;
      background: rgba(37, 99, 235, 0.24);
      animation: user-marker-pulse 1.55s ease-in-out infinite;
    }

    .user-marker__dot {
      position: absolute;
      inset: 4px;
      border-radius: 9999px;
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
      border: 3px solid #ffffff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.32);
    }

    .user-marker__core {
      position: absolute;
      inset: 11px;
      border-radius: 9999px;
      background: #ffffff;
    }

    .tour-checkpoint-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #9a3412;
      font-size: 10px;
      font-weight: 700;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 180px;
    }

    .popup-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #262626;
    }

    .popup-meta {
      margin-top: 4px;
      font-size: 11px;
      color: #8b8b8b;
    }

    .popup-description {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.45;
      color: #5f5f5f;
    }

    .popup-grid {
      display: grid;
      row-gap: 8px;
      margin-top: 8px;
    }

    .popup-row {
      display: grid;
      row-gap: 2px;
    }

    .popup-label {
      font-size: 11px;
      font-weight: 600;
      color: #7c7c7c;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .popup-value {
      font-size: 12px;
      line-height: 1.4;
      color: #262626;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>__LEAFLET_JS__</script>
  <script>
    const decodeBase64Json = (value) => {
      const binary = window.atob(value);
      return JSON.parse(decodeURIComponent(escape(binary)));
    };

    const DEFAULT_CENTER = [10.7578, 106.7033];
    const DEFAULT_BROWSE_ZOOM = 15;
    const DEFAULT_TRIGGER_RADIUS_METERS = 20;
    const EARTH_RADIUS_METERS = 6371000;
    const state = decodeBase64Json("__MAP_STATE_BASE64__");
    const map = L.map("map", {
      zoomControl: false,
      preferCanvas: true,
      attributionControl: false
    }).setView(DEFAULT_CENTER, DEFAULT_BROWSE_ZOOM);

    const poiMarkers = new Map();
    let featuredLabel = state.featuredLabel ?? "";
    let pois = Array.isArray(state.pois) ? state.pois : [];
    let selectedPoiId = state.selectedPoiId ?? null;
    let activePoiId = state.activePoiId ?? null;
    let userLocationState = state.userLocation ?? null;
    const allowLocationMockSelection = state.allowLocationMockSelection === true;
    let routeSimulationState = state.routeSimulation ?? null;
    let currentTour = state.currentTour ?? null;
    let viewportInsets = {
      browseTop: 180,
      browseBottom: 168,
      tourTop: 230,
      tourBottom: 210
    };
    let userMarker = null;
    let routeSimulationLayer = null;
    let tourRouteLayer = null;
    const tourCheckpointLayers = [];

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const hasVisibleTour = () =>
      Boolean(currentTour && Array.isArray(currentTour.stopPoiIds) && currentTour.stopPoiIds.length);

    const hasSimulationRoute = () =>
      Boolean(routeSimulationState && Array.isArray(routeSimulationState.points) && routeSimulationState.points.length > 1);

    const getSimulationEligiblePoiSet = () =>
      new Set((routeSimulationState?.eligiblePoiIds ?? []).map((item) => String(item)));

    const getTourPoiSet = () => new Set((currentTour?.stopPoiIds ?? []).map((item) => String(item)));

    const getTourStopOrder = (poiId) => {
      if (!currentTour || !currentTour.stopOrderByPoiId) {
        return null;
      }

      return currentTour.stopOrderByPoiId[poiId] ?? null;
    };

    const resolvePoiTriggerRadius = (poi) =>
      Number.isFinite(poi?.triggerRadius) && poi.triggerRadius >= DEFAULT_TRIGGER_RADIUS_METERS
        ? poi.triggerRadius
        : DEFAULT_TRIGGER_RADIUS_METERS;

    const toDegrees = (radians) => (radians * 180) / Math.PI;
    const clampLatitude = (latitude) => Math.max(-90, Math.min(90, latitude));
    const clampLongitude = (longitude) => Math.max(-180, Math.min(180, longitude));

    const buildPoiRadiusBounds = (latitude, longitude, radiusMeters) => {
      const safeRadius = Math.max(DEFAULT_TRIGGER_RADIUS_METERS, radiusMeters || 0);
      const angularDistance = safeRadius / EARTH_RADIUS_METERS;
      const latitudeDelta = toDegrees(angularDistance);
      const latitudeRadians = latitude * (Math.PI / 180);
      const cosLatitude = Math.cos(latitudeRadians);
      const longitudeDelta = Math.abs(cosLatitude) < 1e-6
        ? 180
        : toDegrees(angularDistance / Math.max(Math.abs(cosLatitude), 1e-6));

      return L.latLngBounds(
        [
          clampLatitude(latitude - latitudeDelta),
          clampLongitude(longitude - longitudeDelta)
        ],
        [
          clampLatitude(latitude + latitudeDelta),
          clampLongitude(longitude + longitudeDelta)
        ]
      );
    };

    const buildPoiBounds = (items) => {
      const validItems = (items || []).filter((item) => item.latitude != null && item.longitude != null);
      if (!validItems.length) {
        return null;
      }

      return validItems.reduce((bounds, item) => {
        const poiBounds = buildPoiRadiusBounds(
          item.latitude,
          item.longitude,
          resolvePoiTriggerRadius(item)
        );

        if (!bounds) {
          return poiBounds;
        }

        bounds.extend(poiBounds);
        return bounds;
      }, null);
    };

    const getPoiVisualState = (poi, selected, active) => {
      const isTourVisible = hasVisibleTour();
      const isInTour = isTourVisible && getTourPoiSet().has(poi.id);
      const order = isInTour ? getTourStopOrder(poi.id) : null;
      const isSimulationVisible = hasSimulationRoute();
      const simulationPoiSet = getSimulationEligiblePoiSet();
      const isRouteDestination = isSimulationVisible && routeSimulationState.destinationPoiId === poi.id;
      const isOnSimulationRoute = isSimulationVisible && simulationPoiSet.has(poi.id);
      const classes = ["poi-marker"];

      let color = poi.isFeatured ? "#f97316" : "#1f2937";
      let halo = "rgba(31, 41, 55, 0.12)";

      if (selected) {
        color = "#0f766e";
        halo = "rgba(15, 118, 110, 0.18)";
        classes.push("selected");
      } else if (active) {
        color = "#ea580c";
        halo = "rgba(234, 88, 12, 0.24)";
        classes.push("active");
      } else if (isRouteDestination) {
        color = "#2563eb";
        halo = "rgba(37, 99, 235, 0.22)";
        classes.push("route-destination");
      } else if (isOnSimulationRoute) {
        color = "#0ea5e9";
        halo = "rgba(14, 165, 233, 0.18)";
        classes.push("on-route");
      } else if (isInTour) {
        color = currentTour.mode === "active" ? "#c2410c" : "#f59e0b";
        halo = currentTour.mode === "active" ? "rgba(194, 65, 12, 0.18)" : "rgba(245, 158, 11, 0.18)";
        classes.push("in-tour");
      } else if (isTourVisible) {
        color = "#94a3b8";
        halo = "rgba(148, 163, 184, 0.12)";
        classes.push("muted");
      }

      const isMuted =
        (!selected && !active && isTourVisible && !isInTour) ||
        (!selected && !active && isSimulationVisible && !isOnSimulationRoute && !isRouteDestination);

      return {
        classes,
        color,
        halo,
        order,
        isInTour,
        isRouteDestination,
        isOnSimulationRoute,
        isMuted
      };
    };

    const createPoiCircleOptions = (poi, selected, active) => {
      const visualState = getPoiVisualState(poi, selected, active);

      let fillColor = poi.isFeatured ? "#fb923c" : "#64748b";
      if (selected) {
        fillColor = "#14b8a6";
      } else if (active) {
        fillColor = "#fb923c";
      } else if (visualState.isRouteDestination) {
        fillColor = "#60a5fa";
      } else if (visualState.isOnSimulationRoute) {
        fillColor = "#38bdf8";
      } else if (visualState.isInTour) {
        fillColor = currentTour.mode === "active" ? "#fb923c" : "#fbbf24";
      }

      return {
        color: visualState.color,
        weight: selected || active ? 2 : 1.5,
        opacity: visualState.isMuted ? 0.44 : selected || active ? 0.92 : 0.68,
        fillColor,
        fillOpacity: visualState.isMuted ? 0.05 : selected || active ? 0.16 : 0.1
      };
    };

    const createPoiIcon = (poi, selected, active) => {
      const visualState = getPoiVisualState(poi, selected, active);
      const orderBadge = visualState.order == null
        ? ""
        : `<span class="poi-marker__order">${visualState.order}</span>`;

      return L.divIcon({
        className: "",
        html: `
          <div class="${visualState.classes.join(" ")}">
            <span class="poi-marker__halo" style="background:${visualState.halo};"></span>
            <span class="poi-marker__dot" style="background:${visualState.color};"></span>
            ${orderBadge}
          </div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });
    };

    const createUserIcon = () => L.divIcon({
      className: "",
      html: `
        <div class="user-marker">
          <span class="user-marker__pulse"></span>
          <span class="user-marker__dot"></span>
          <span class="user-marker__core"></span>
        </div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    const buildPoiPopupHtml = (poi) => {
      const featuredText = poi.isFeatured && featuredLabel ? ` &bull; ${featuredLabel}` : "";
      const triggerRadiusText = `${resolvePoiTriggerRadius(poi)} m`;
      return `
      <div>
        <p class="popup-title">${poi.title}</p>
        <div class="popup-meta">${poi.category}${featuredText}</div>
        <div class="popup-description">${poi.address}</div>
        <div class="popup-grid">
          <div class="popup-row">
            <span class="popup-label">Bán kính kích hoạt</span>
            <span class="popup-value">${triggerRadiusText}</span>
          </div>
        </div>
      </div>`;
    };

    const buildUserPopupHtml = (user) => {
      if (!user) {
        return "";
      }

      const sourceRow = user.sourceLabel && user.sourceText
        ? `
          <div class="popup-row">
            <span class="popup-label">${user.sourceLabel}</span>
            <span class="popup-value">${user.sourceText}</span>
          </div>`
        : "";

      return `
      <div>
        <p class="popup-title">${user.popupTitle || "User location"}</p>
        <div class="popup-grid">
          <div class="popup-row">
            <span class="popup-label">${user.coordinatesLabel || "Coordinates"}</span>
            <span class="popup-value">${user.coordinatesText || "--"}</span>
          </div>
          ${sourceRow}
          <div class="popup-row">
            <span class="popup-label">${user.statusLabel || "Status"}</span>
            <span class="popup-value">${user.statusText || "--"}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">${user.nearestPoiLabel || "Nearest POI"}</span>
            <span class="popup-value">${user.nearestPoiText || "--"}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">${user.nearestDistanceLabel || "Nearest distance"}</span>
            <span class="popup-value">${user.nearestDistanceText || "--"}</span>
          </div>
        </div>
      </div>`;
    };

    const clearTourLayers = () => {
      if (tourRouteLayer) {
        map.removeLayer(tourRouteLayer);
        tourRouteLayer = null;
      }

      while (tourCheckpointLayers.length) {
        map.removeLayer(tourCheckpointLayers.pop());
      }
    };

    const refreshRouteSimulationLayer = () => {
      if (routeSimulationLayer) {
        map.removeLayer(routeSimulationLayer);
        routeSimulationLayer = null;
      }

      if (!hasSimulationRoute()) {
        return;
      }

      const points = (routeSimulationState.points || [])
        .filter((item) => item.latitude != null && item.longitude != null);
      if (points.length < 2) {
        return;
      }

      routeSimulationLayer = L.polyline(
        points.map((item) => [item.latitude, item.longitude]),
        {
          color: "#2563eb",
          weight: 5,
          opacity: 0.88,
          lineCap: "round",
          lineJoin: "round"
        }
      ).addTo(map);
      routeSimulationLayer.bringToBack();
    };

    const refreshTourLayers = () => {
      clearTourLayers();
      if (!hasVisibleTour()) {
        return;
      }

      const checkpoints = (currentTour.checkpoints || [])
        .filter((item) => item.latitude != null && item.longitude != null);

      if (checkpoints.length >= 2) {
        tourRouteLayer = L.polyline(
          checkpoints.map((item) => [item.latitude, item.longitude]),
          {
            color: currentTour.mode === "active" ? "#c2410c" : "#f59e0b",
            weight: 5,
            opacity: 0.84,
            dashArray: currentTour.mode === "preview" ? "12 8" : null,
            lineCap: "round",
            lineJoin: "round"
          }
        ).addTo(map);
      }

      checkpoints.forEach((checkpoint) => {
        const layer = L.circleMarker([checkpoint.latitude, checkpoint.longitude], {
          radius: checkpoint.isCompleted ? 7 : 6,
          weight: 2,
          color: checkpoint.isCompleted ? "#c2410c" : "#f59e0b",
          fillColor: checkpoint.isCompleted ? "#fdba74" : "#fff7ed",
          fillOpacity: 0.95,
          opacity: 0.92
        }).addTo(map);

        layer.bindTooltip(String(checkpoint.order), {
          permanent: true,
          direction: "center",
          className: "tour-checkpoint-label"
        });

        tourCheckpointLayers.push(layer);
      });
    };

    const createPoiMarker = (poi) => {
      const isSelected = poi.id === selectedPoiId;
      const isActive = poi.id === activePoiId;
      const circle = L.circle([poi.latitude, poi.longitude], {
        radius: resolvePoiTriggerRadius(poi),
        ...createPoiCircleOptions(poi, isSelected, isActive),
        interactive: false
      }).addTo(map);

      const marker = L.marker([poi.latitude, poi.longitude], {
        icon: createPoiIcon(poi, isSelected, isActive),
        keyboard: false
      }).addTo(map);

      marker.bindPopup(buildPoiPopupHtml(poi));
      marker.on("click", () => {
        notifyPoiSelected(poi.id, true);
      });

      circle.bringToBack();
      poiMarkers.set(poi.id, { marker, circle });
    };

    const syncPoiMarkers = (openPopupForSelection) => {
      const nextPoiIds = new Set(pois.map((poi) => String(poi.id)));

      Array.from(poiMarkers.entries()).forEach(([poiId, layers]) => {
        if (nextPoiIds.has(poiId)) {
          return;
        }

        map.removeLayer(layers.marker);
        map.removeLayer(layers.circle);
        poiMarkers.delete(poiId);
      });

      pois.forEach((poi) => {
        const layers = poiMarkers.get(poi.id);
        if (!layers) {
          createPoiMarker(poi);
          return;
        }

        layers.marker.setLatLng([poi.latitude, poi.longitude]);
        layers.marker.bindPopup(buildPoiPopupHtml(poi));
        layers.circle.setLatLng([poi.latitude, poi.longitude]);
        layers.circle.setRadius(resolvePoiTriggerRadius(poi));
      });

      if (selectedPoiId && !poiMarkers.has(selectedPoiId)) {
        selectedPoiId = null;
      }

      if (activePoiId && !poiMarkers.has(activePoiId)) {
        activePoiId = null;
      }

      refreshPoiMarkers(openPopupForSelection);
    };

    const refreshPoiMarkers = (openPopupForSelection) => {
      const tourPoiSet = getTourPoiSet();
      const isTourVisible = hasVisibleTour();
      const simulationPoiSet = getSimulationEligiblePoiSet();
      const isSimulationVisible = hasSimulationRoute();

      pois.forEach((poi) => {
        const layers = poiMarkers.get(poi.id);
        if (!layers) {
          return;
        }

        const isSelected = poi.id === selectedPoiId;
        const isActive = poi.id === activePoiId;
        const isInTour = tourPoiSet.has(poi.id);
        const isRouteDestination = isSimulationVisible && routeSimulationState.destinationPoiId === poi.id;
        const isOnSimulationRoute = isSimulationVisible && simulationPoiSet.has(poi.id);
        const visualState = getPoiVisualState(poi, isSelected, isActive);

        layers.marker.setIcon(createPoiIcon(poi, isSelected, isActive));
        layers.marker.setOpacity(visualState.isMuted ? 0.58 : 1);
        layers.marker.setZIndexOffset(
          isActive ? 1200 :
          isSelected ? 1000 :
          isRouteDestination ? 520 :
          isOnSimulationRoute ? 460 :
          isInTour ? 420 :
          0
        );
        layers.circle.setLatLng([poi.latitude, poi.longitude]);
        layers.circle.setRadius(resolvePoiTriggerRadius(poi));
        layers.circle.setStyle(createPoiCircleOptions(poi, isSelected, isActive));
        layers.circle.bringToBack();

        if (isSelected) {
          if (openPopupForSelection) {
            layers.marker.openPopup();
          }

          return;
        }

        layers.marker.closePopup();
      });
    };

    const setSelectedPoi = (poiId, openPopup) => {
      selectedPoiId = poiId;
      refreshPoiMarkers(openPopup);
    };

    const setActivePoi = (poiId) => {
      activePoiId = poiId;
      refreshPoiMarkers(false);
    };

    const setTourState = (nextTourState) => {
      currentTour = nextTourState || null;
      refreshTourLayers();
      refreshPoiMarkers(false);
    };

    const setRouteSimulation = (nextRouteSimulation) => {
      routeSimulationState = nextRouteSimulation || null;
      refreshRouteSimulationLayer();
      refreshPoiMarkers(false);
    };

    const setViewportInsets = (nextInsets) => {
      viewportInsets = {
        ...viewportInsets,
        ...(nextInsets || {})
      };
    };

    const getBrowseFitOptions = () => ({
      paddingTopLeft: [22, Math.max(96, viewportInsets.browseTop || 180)],
      paddingBottomRight: [22, Math.max(96, viewportInsets.browseBottom || 168)],
      maxZoom: 16,
      animate: false
    });

    const getTourFitOptions = () => ({
      paddingTopLeft: [24, Math.max(120, viewportInsets.tourTop || 230)],
      paddingBottomRight: [24, Math.max(132, viewportInsets.tourBottom || 210)],
      maxZoom: 16,
      animate: false
    });

    const notifyPoiSelected = (poiId, openPopup) => {
      if (!poiId || !poiMarkers.has(poiId)) {
        return;
      }

      setSelectedPoi(poiId, openPopup);
      window.location.href = `vkfood://select-poi/${encodeURIComponent(poiId)}`;
    };

    const notifySimulatedLocationMoved = (latitude, longitude) => {
      window.location.href = `vkfood://set-simulated-location?lat=${encodeURIComponent(latitude)}&lng=${encodeURIComponent(longitude)}`;
    };

    const upsertUserLocationMarker = (nextState) => {
      const hasCoordinates = nextState &&
        nextState.latitude != null &&
        nextState.longitude != null;

      userLocationState = hasCoordinates ? nextState : null;
      if (!userLocationState) {
        if (userMarker) {
          map.removeLayer(userMarker);
          userMarker = null;
        }

        return;
      }

      const latLng = [userLocationState.latitude, userLocationState.longitude];
      const keepPopupOpen = Boolean(userMarker && userMarker.isPopupOpen());

      if (!userMarker) {
        userMarker = L.marker(latLng, {
          icon: createUserIcon(),
          draggable: allowLocationMockSelection,
          keyboard: false,
          zIndexOffset: 1200
        }).addTo(map);

        userMarker.on("click", () => {
          userMarker.openPopup();
        });
        userMarker.on("dragend", (event) => {
          const nextPosition = event.target.getLatLng();
          notifySimulatedLocationMoved(nextPosition.lat, nextPosition.lng);
        });
      } else {
        userMarker.setLatLng(latLng);
        userMarker.setIcon(createUserIcon());
        if (allowLocationMockSelection && userMarker.dragging && !userMarker.dragging.enabled()) {
          userMarker.dragging.enable();
        } else if (!allowLocationMockSelection && userMarker.dragging && userMarker.dragging.enabled()) {
          userMarker.dragging.disable();
        }
      }

      userMarker.bindPopup(buildUserPopupHtml(userLocationState));
      if (keepPopupOpen) {
        userMarker.openPopup();
      }
    };

    const fitMap = () => {
      if (!pois.length) {
        if (userLocationState && userLocationState.latitude != null && userLocationState.longitude != null) {
          map.setView([userLocationState.latitude, userLocationState.longitude], 17, { animate: false });
          return;
        }

        map.setView(DEFAULT_CENTER, DEFAULT_BROWSE_ZOOM, { animate: false });
        return;
      }

      if (pois.length === 1) {
        const singlePoiBounds = buildPoiBounds(pois);
        if (singlePoiBounds && singlePoiBounds.isValid()) {
          map.fitBounds(singlePoiBounds.pad(0.18), getBrowseFitOptions());
          return;
        }

        map.setView([pois[0].latitude, pois[0].longitude], 16, { animate: false });
        return;
      }

      const bounds = buildPoiBounds(pois);
      if (bounds && bounds.isValid()) {
        map.fitBounds(bounds.pad(0.12), getBrowseFitOptions());
      }
    };

    const fitToTour = () => {
      if (!hasVisibleTour()) {
        return;
      }

      const checkpoints = (currentTour.checkpoints || [])
        .filter((item) => item.latitude != null && item.longitude != null);

      if (!checkpoints.length) {
        return;
      }

      if (checkpoints.length === 1) {
        map.flyTo([checkpoints[0].latitude, checkpoints[0].longitude], 16, {
          animate: false
        });
        return;
      }

      const bounds = L.latLngBounds(checkpoints.map((item) => [item.latitude, item.longitude]));
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.16), getTourFitOptions());
      }
    };

    if (allowLocationMockSelection) {
      map.on("click", (event) => {
        notifySimulatedLocationMoved(event.latlng.lat, event.latlng.lng);
      });
    }

    fitMap();
    upsertUserLocationMarker(userLocationState);
    refreshRouteSimulationLayer();
    refreshTourLayers();
    syncPoiMarkers(Boolean(selectedPoiId));

    if (hasVisibleTour()) {
      fitToTour();
    }

    const fitToSimulationRoute = () => {
      if (!hasSimulationRoute()) {
        return;
      }

      const points = (routeSimulationState.points || [])
        .filter((item) => item.latitude != null && item.longitude != null);
      if (!points.length) {
        return;
      }

      if (points.length === 1) {
        map.flyTo([points[0].latitude, points[0].longitude], 17, {
          animate: false
        });
        return;
      }

      const bounds = L.latLngBounds(points.map((item) => [item.latitude, item.longitude]));
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.14), getBrowseFitOptions());
      }
    };

    window.vkFoodMap = {
      selectPoi: (poiId) => {
        if (!poiId) {
          setSelectedPoi(null, false);
          return;
        }

        if (!poiMarkers.has(poiId)) {
          return;
        }

        setSelectedPoi(poiId, true);
      },
      setActivePoi: (poiId) => {
        setActivePoi(poiId || null);
      },
      setUserLocation: (nextState) => {
        upsertUserLocationMarker(nextState);
      },
      setCurrentLocation: (latitude, longitude) => {
        if (latitude == null || longitude == null) {
          upsertUserLocationMarker(null);
          return;
        }

        upsertUserLocationMarker({
          ...(userLocationState || {}),
          latitude,
          longitude
        });
      },
      setRouteSimulation: (nextRouteSimulation) => {
        setRouteSimulation(nextRouteSimulation);
      },
      setTourState: (nextTourState) => {
        setTourState(nextTourState);
      },
      setViewportInsets: (nextInsets) => {
        setViewportInsets(nextInsets);
      },
      setPoiData: (nextPoiState) => {
        featuredLabel = nextPoiState?.featuredLabel ?? "";
        pois = Array.isArray(nextPoiState?.pois) ? nextPoiState.pois : [];
        syncPoiMarkers(Boolean(selectedPoiId));
      },
      fitToTour: () => {
        fitToTour();
      },
      fitToSimulationRoute: () => {
        fitToSimulationRoute();
      },
      flyToCoordinate: (latitude, longitude, zoom, animate) => {
        if (latitude == null || longitude == null) {
          return;
        }

        map.flyTo([latitude, longitude], zoom || 17, {
          animate: animate !== false,
          duration: 0.35
        });
      }
    };

  </script>
</body>
</html>
