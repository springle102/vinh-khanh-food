<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>OpenStreetMap</title>
  <style>
    __LEAFLET_CSS__

    html, body, #map {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: #f0ece6;
    }

    .leaflet-container {
      background: #f0ece6;
    }

    .leaflet-control-zoom,
    .leaflet-control-attribution {
      display: none;
    }

    .leaflet-tile {
      filter: saturate(0.82) brightness(1.03);
    }

    .poi-marker {
      position: relative;
      width: 24px;
      height: 24px;
    }

    .poi-marker__halo {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      transform: scale(1.7);
      transition: transform 120ms ease, opacity 120ms ease;
    }

    .poi-marker__dot {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      border: 3px solid #ffffff;
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.20);
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
    }

    .poi-marker__order {
      position: absolute;
      right: -7px;
      top: -8px;
      min-width: 16px;
      height: 16px;
      padding: 0 3px;
      border-radius: 9999px;
      background: #fff7ed;
      border: 1px solid rgba(217, 119, 6, 0.35);
      color: #9a3412;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
    }

    .poi-marker.muted .poi-marker__dot,
    .poi-marker.muted .poi-marker__halo {
      opacity: 0.54;
    }

    .poi-marker.in-tour .poi-marker__dot {
      box-shadow: 0 12px 20px rgba(217, 119, 6, 0.22);
    }

    @keyframes selected-marker-pulse {
      0% {
        transform: scale(1.78);
        opacity: 0.88;
      }

      50% {
        transform: scale(2.06);
        opacity: 0.38;
      }

      100% {
        transform: scale(1.78);
        opacity: 0.88;
      }
    }

    @keyframes active-marker-pulse {
      0% {
        transform: scale(1.9);
        opacity: 0.82;
      }

      50% {
        transform: scale(2.18);
        opacity: 0.3;
      }

      100% {
        transform: scale(1.9);
        opacity: 0.82;
      }
    }

    @keyframes user-marker-pulse {
      0% {
        transform: scale(0.84);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.24);
        opacity: 0.18;
      }

      100% {
        transform: scale(0.84);
        opacity: 0.8;
      }
    }

    .poi-marker.selected .poi-marker__halo {
      transform: scale(1.95);
      animation: selected-marker-pulse 1.8s ease-in-out infinite;
    }

    .poi-marker.selected .poi-marker__dot {
      transform: scale(1.1);
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.24);
    }

    .poi-marker.active .poi-marker__halo {
      transform: scale(2.02);
      animation: active-marker-pulse 1.25s ease-in-out infinite;
    }

    .poi-marker.active .poi-marker__dot {
      transform: scale(1.14);
      box-shadow: 0 14px 24px rgba(194, 65, 12, 0.32);
    }

    .user-marker {
      position: relative;
      width: 30px;
      height: 30px;
    }

    .user-marker__pulse {
      position: absolute;
      inset: 1px;
      border-radius: 9999px;
      background: rgba(37, 99, 235, 0.24);
      animation: user-marker-pulse 1.55s ease-in-out infinite;
    }

    .user-marker__dot {
      position: absolute;
      inset: 4px;
      border-radius: 9999px;
      background: linear-gradient(180deg, #60a5fa 0%, #2563eb 100%);
      border: 3px solid #ffffff;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.32);
    }

    .user-marker__core {
      position: absolute;
      inset: 11px;
      border-radius: 9999px;
      background: #ffffff;
    }

    .heat-point {
      width: 124px;
      height: 124px;
      margin-left: -62px;
      margin-top: -62px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(244, 88, 34, 0.60) 0%, rgba(255, 177, 56, 0.34) 30%, rgba(255, 200, 76, 0.16) 54%, rgba(255, 200, 76, 0) 74%);
      filter: blur(1.6px);
      pointer-events: none;
    }

    .tour-checkpoint-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #9a3412;
      font-size: 10px;
      font-weight: 700;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 180px;
    }

    .popup-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #262626;
    }

    .popup-meta {
      margin-top: 4px;
      font-size: 11px;
      color: #8b8b8b;
    }

    .popup-description {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.45;
      color: #5f5f5f;
    }

    .popup-grid {
      display: grid;
      row-gap: 8px;
      margin-top: 8px;
    }

    .popup-row {
      display: grid;
      row-gap: 2px;
    }

    .popup-label {
      font-size: 11px;
      font-weight: 600;
      color: #7c7c7c;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .popup-value {
      font-size: 12px;
      line-height: 1.4;
      color: #262626;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>__LEAFLET_JS__</script>
  <script>
    const decodeBase64Json = (value) => {
      const binary = window.atob(value);
      return JSON.parse(decodeURIComponent(escape(binary)));
    };

    const DEFAULT_CENTER = [10.7578, 106.7033];
    const DEFAULT_BROWSE_ZOOM = 15;
    const state = decodeBase64Json("__MAP_STATE_BASE64__");
    const map = L.map("map", {
      zoomControl: false,
      preferCanvas: true,
      attributionControl: false
    }).setView(DEFAULT_CENTER, DEFAULT_BROWSE_ZOOM);

    const poiMarkers = new Map();
    const heatLayers = [];
    let selectedPoiId = state.selectedPoiId ?? null;
    let activePoiId = state.activePoiId ?? null;
    let virtualUserState = state.virtualUser ?? null;
    let currentTour = state.currentTour ?? null;
    let viewportInsets = {
      browseTop: 180,
      browseBottom: 168,
      tourTop: 230,
      tourBottom: 210
    };
    let userMarker = null;
    let tourRouteLayer = null;
    const tourCheckpointLayers = [];

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const hasVisibleTour = () =>
      Boolean(currentTour && Array.isArray(currentTour.stopPoiIds) && currentTour.stopPoiIds.length);

    const getTourPoiSet = () => new Set((currentTour?.stopPoiIds ?? []).map((item) => String(item)));

    const getTourStopOrder = (poiId) => {
      if (!currentTour || !currentTour.stopOrderByPoiId) {
        return null;
      }

      return currentTour.stopOrderByPoiId[poiId] ?? null;
    };

    const createPoiIcon = (poi, selected, active) => {
      const isTourVisible = hasVisibleTour();
      const inTour = isTourVisible && getTourPoiSet().has(poi.id);
      const order = inTour ? getTourStopOrder(poi.id) : null;
      const classes = ["poi-marker"];

      let color = poi.isFeatured ? "#f97316" : "#1f2937";
      let halo = "rgba(31, 41, 55, 0.12)";

      if (selected) {
        color = "#0f766e";
        halo = "rgba(15, 118, 110, 0.18)";
        classes.push("selected");
      } else if (active) {
        color = "#ea580c";
        halo = "rgba(234, 88, 12, 0.24)";
        classes.push("active");
      } else if (inTour) {
        color = currentTour.mode === "active" ? "#c2410c" : "#f59e0b";
        halo = currentTour.mode === "active" ? "rgba(194, 65, 12, 0.18)" : "rgba(245, 158, 11, 0.18)";
        classes.push("in-tour");
      } else if (isTourVisible) {
        color = "#94a3b8";
        halo = "rgba(148, 163, 184, 0.12)";
        classes.push("muted");
      }

      const orderBadge = order == null
        ? ""
        : `<span class="poi-marker__order">${order}</span>`;

      return L.divIcon({
        className: "",
        html: `
          <div class="${classes.join(" ")}">
            <span class="poi-marker__halo" style="background:${halo};"></span>
            <span class="poi-marker__dot" style="background:${color};"></span>
            ${orderBadge}
          </div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 12]
      });
    };

    const createHeatIcon = (intensity) => L.divIcon({
      className: "",
      html: `<div class="heat-point" style="opacity:${Math.min(1, Math.max(0.32, intensity))}; transform: scale(${0.76 + intensity * 0.52});"></div>`,
      iconSize: [124, 124],
      iconAnchor: [62, 62]
    });

    const createUserIcon = () => L.divIcon({
      className: "",
      html: `
        <div class="user-marker">
          <span class="user-marker__pulse"></span>
          <span class="user-marker__dot"></span>
          <span class="user-marker__core"></span>
        </div>`,
      iconSize: [30, 30],
      iconAnchor: [15, 15]
    });

    const buildPoiPopupHtml = (poi) => {
      const featuredText = poi.isFeatured && state.featuredLabel ? ` &bull; ${state.featuredLabel}` : "";
      return `
      <div>
        <p class="popup-title">${poi.title}</p>
        <div class="popup-meta">${poi.category}${featuredText}</div>
        <div class="popup-description">${poi.address}</div>
      </div>`;
    };

    const buildUserPopupHtml = (user) => {
      if (!user) {
        return "";
      }

      return `
      <div>
        <p class="popup-title">${user.popupTitle || "Virtual user"}</p>
        <div class="popup-grid">
          <div class="popup-row">
            <span class="popup-label">${user.coordinatesLabel || "Coordinates"}</span>
            <span class="popup-value">${user.coordinatesText || "--"}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">${user.statusLabel || "Status"}</span>
            <span class="popup-value">${user.statusText || "--"}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">${user.nearestPoiLabel || "Nearest POI"}</span>
            <span class="popup-value">${user.nearestPoiText || "--"}</span>
          </div>
          <div class="popup-row">
            <span class="popup-label">${user.nearestDistanceLabel || "Nearest distance"}</span>
            <span class="popup-value">${user.nearestDistanceText || "--"}</span>
          </div>
        </div>
      </div>`;
    };

    const clearTourLayers = () => {
      if (tourRouteLayer) {
        map.removeLayer(tourRouteLayer);
        tourRouteLayer = null;
      }

      while (tourCheckpointLayers.length) {
        map.removeLayer(tourCheckpointLayers.pop());
      }
    };

    const refreshTourLayers = () => {
      clearTourLayers();
      if (!hasVisibleTour()) {
        return;
      }

      const checkpoints = (currentTour.checkpoints || [])
        .filter((item) => item.latitude != null && item.longitude != null);

      if (checkpoints.length >= 2) {
        tourRouteLayer = L.polyline(
          checkpoints.map((item) => [item.latitude, item.longitude]),
          {
            color: currentTour.mode === "active" ? "#c2410c" : "#f59e0b",
            weight: 5,
            opacity: 0.84,
            dashArray: currentTour.mode === "preview" ? "12 8" : null,
            lineCap: "round",
            lineJoin: "round"
          }
        ).addTo(map);
      }

      checkpoints.forEach((checkpoint) => {
        const layer = L.circleMarker([checkpoint.latitude, checkpoint.longitude], {
          radius: checkpoint.isCompleted ? 7 : 6,
          weight: 2,
          color: checkpoint.isCompleted ? "#c2410c" : "#f59e0b",
          fillColor: checkpoint.isCompleted ? "#fdba74" : "#fff7ed",
          fillOpacity: 0.95,
          opacity: 0.92
        }).addTo(map);

        layer.bindTooltip(String(checkpoint.order), {
          permanent: true,
          direction: "center",
          className: "tour-checkpoint-label"
        });

        tourCheckpointLayers.push(layer);
      });
    };

    const refreshPoiMarkers = (openPopupForSelection) => {
      const tourPoiSet = getTourPoiSet();
      const isTourVisible = hasVisibleTour();

      state.pois.forEach((poi) => {
        const marker = poiMarkers.get(poi.id);
        if (!marker) {
          return;
        }

        const isSelected = poi.id === selectedPoiId;
        const isActive = poi.id === activePoiId;
        const isInTour = tourPoiSet.has(poi.id);
        const isMuted = isTourVisible && !isSelected && !isActive && !isInTour;

        marker.setIcon(createPoiIcon(poi, isSelected, isActive));
        marker.setOpacity(isMuted ? 0.58 : 1);
        marker.setZIndexOffset(
          isActive ? 1200 :
          isSelected ? 1000 :
          isInTour ? 420 :
          0
        );

        if (isSelected) {
          if (openPopupForSelection) {
            marker.openPopup();
          }

          return;
        }

        marker.closePopup();
      });
    };

    const setSelectedPoi = (poiId, openPopup) => {
      selectedPoiId = poiId;
      refreshPoiMarkers(openPopup);
    };

    const setActivePoi = (poiId) => {
      activePoiId = poiId;
      refreshPoiMarkers(false);
    };

    const setTourState = (nextTourState) => {
      currentTour = nextTourState || null;
      refreshTourLayers();
      refreshPoiMarkers(false);
    };

    const setViewportInsets = (nextInsets) => {
      viewportInsets = {
        ...viewportInsets,
        ...(nextInsets || {})
      };
    };

    const getBrowseFitOptions = () => ({
      paddingTopLeft: [22, Math.max(96, viewportInsets.browseTop || 180)],
      paddingBottomRight: [22, Math.max(96, viewportInsets.browseBottom || 168)],
      maxZoom: 16,
      animate: false
    });

    const getTourFitOptions = () => ({
      paddingTopLeft: [24, Math.max(120, viewportInsets.tourTop || 230)],
      paddingBottomRight: [24, Math.max(132, viewportInsets.tourBottom || 210)],
      maxZoom: 16,
      animate: false
    });

    const notifyPoiSelected = (poiId, openPopup) => {
      if (!poiId || !poiMarkers.has(poiId)) {
        return;
      }

      setSelectedPoi(poiId, openPopup);
      window.location.href = `vkfood://select-poi/${encodeURIComponent(poiId)}`;
    };

    const notifyVirtualUserMoved = (latitude, longitude) => {
      window.location.href = `vkfood://set-virtual-location?lat=${encodeURIComponent(latitude)}&lng=${encodeURIComponent(longitude)}`;
    };

    const upsertVirtualUserMarker = (nextState) => {
      const hasCoordinates = nextState &&
        nextState.latitude != null &&
        nextState.longitude != null;

      virtualUserState = hasCoordinates ? nextState : null;
      if (!virtualUserState) {
        if (userMarker) {
          map.removeLayer(userMarker);
          userMarker = null;
        }

        return;
      }

      const latLng = [virtualUserState.latitude, virtualUserState.longitude];
      const keepPopupOpen = Boolean(userMarker && userMarker.isPopupOpen());

      if (!userMarker) {
        userMarker = L.marker(latLng, {
          icon: createUserIcon(),
          keyboard: false,
          zIndexOffset: 1200
        }).addTo(map);

        userMarker.on("click", () => {
          userMarker.openPopup();
        });
      } else {
        userMarker.setLatLng(latLng);
        userMarker.setIcon(createUserIcon());
      }

      userMarker.bindPopup(buildUserPopupHtml(virtualUserState));
      if (keepPopupOpen) {
        userMarker.openPopup();
      }
    };

    state.heatPoints.forEach((point) => {
      const heat = L.marker([point.latitude, point.longitude], {
        icon: createHeatIcon(point.intensity),
        interactive: false,
        keyboard: false
      }).addTo(map);

      heatLayers.push(heat);
    });

    state.pois.forEach((poi) => {
      const marker = L.marker([poi.latitude, poi.longitude], {
        icon: createPoiIcon(poi, poi.id === selectedPoiId, poi.id === activePoiId),
        keyboard: false
      }).addTo(map);

      marker.bindPopup(buildPoiPopupHtml(poi));
      marker.on("click", () => {
        notifyPoiSelected(poi.id, true);
      });

      poiMarkers.set(poi.id, marker);
    });

    const fitMap = () => {
      if (!state.pois.length) {
        if (virtualUserState && virtualUserState.latitude != null && virtualUserState.longitude != null) {
          map.setView([virtualUserState.latitude, virtualUserState.longitude], 17, { animate: false });
          return;
        }

        map.setView(DEFAULT_CENTER, DEFAULT_BROWSE_ZOOM, { animate: false });
        return;
      }

      if (state.pois.length === 1) {
        map.setView([state.pois[0].latitude, state.pois[0].longitude], 16, { animate: false });
        return;
      }

      const bounds = L.latLngBounds(state.pois.map((poi) => [poi.latitude, poi.longitude]));
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.12), getBrowseFitOptions());
      }
    };

    const fitToTour = () => {
      if (!hasVisibleTour()) {
        return;
      }

      const checkpoints = (currentTour.checkpoints || [])
        .filter((item) => item.latitude != null && item.longitude != null);

      if (!checkpoints.length) {
        return;
      }

      if (checkpoints.length === 1) {
        map.flyTo([checkpoints[0].latitude, checkpoints[0].longitude], 16, {
          animate: false
        });
        return;
      }

      const bounds = L.latLngBounds(checkpoints.map((item) => [item.latitude, item.longitude]));
      if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.16), getTourFitOptions());
      }
    };

    map.on("click", (event) => {
      notifyVirtualUserMoved(event.latlng.lat, event.latlng.lng);
    });

    fitMap();
    upsertVirtualUserMarker(virtualUserState);
    refreshTourLayers();
    refreshPoiMarkers(Boolean(selectedPoiId));

    if (hasVisibleTour()) {
      fitToTour();
    }

    window.vkFoodMap = {
      selectPoi: (poiId) => {
        if (!poiId) {
          setSelectedPoi(null, false);
          return;
        }

        if (!poiMarkers.has(poiId)) {
          return;
        }

        setSelectedPoi(poiId, true);
      },
      setActivePoi: (poiId) => {
        setActivePoi(poiId || null);
      },
      setVirtualUser: (nextState) => {
        upsertVirtualUserMarker(nextState);
      },
      setHeatmapVisible: (isVisible) => {
        heatLayers.forEach((heat) => {
          const element = heat.getElement();
          if (element) {
            element.style.display = isVisible ? "block" : "none";
          }
        });
      },
      setTourState: (nextTourState) => {
        setTourState(nextTourState);
      },
      setViewportInsets: (nextInsets) => {
        setViewportInsets(nextInsets);
      },
      fitToTour: () => {
        fitToTour();
      },
      flyToCoordinate: (latitude, longitude, zoom, animate) => {
        if (latitude == null || longitude == null) {
          return;
        }

        map.flyTo([latitude, longitude], zoom || 17, {
          animate: animate !== false,
          duration: 0.35
        });
      }
    };

    window.vkFoodMap.setHeatmapVisible(state.isHeatmapVisible !== false);
  </script>
</body>
</html>
